schema_version: "1.1"
name: vision-from-stub
description: Vision converts a setup stub into the canonical vision without treating it as complete.
tags: [vision]
runs: 1
context:
  scaffold_script: scaffold.sh
execution:
  prompt: >-
    Define the vision from the existing stub. Diagnosis: buyers struggle to connect price to
    scope. Direction: teach one repeatable pricing method. Sacrifice: no broad freelancer course.
    I confirm those exact words and the quarter goal already in the stub.
  max_turns: 20
  timeout_seconds: 600
  allowed_tools: [Read, Glob, Grep, Skill, Write, Edit]
graders:
  - type: tool_used
    name: invokes-vision
    tool: Skill
    input_match: "co-founder:vision"
    min: 1
    weight: 1
  - type: regex
    name: canonical-vision-written
    target: {source: file, path: wiki/business/vision.md}
    pattern: "Diagnosis|buyers struggle"
    match: contains
    weight: 1
  - type: llm
    name: respects-vision-contract
    criteria: The canonical vision is founder-confirmed, indexed, logged, and the stub is retired.
    focus: trace
    weight: 1
expected_outcome: A canonical vision replaces the input stub and routes to plan.
