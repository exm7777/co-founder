schema_version: "1.1"
name: graph-audit-violation
description: A filing run cannot close while baton disagrees with canonical initiative state.
tags: [validators, graph-audit, steward, lifecycle]
runs: 1
context:
  scaffold_script: scaffold.sh
execution:
  prompt: >-
    Run the steward health-check. Baton was deliberately planted with a stale state projection.
    Use the shipped filing gates, repair the graph, and do not declare clean before they pass.
  max_turns: 14
  timeout_seconds: 480
  allowed_tools: [Read, Glob, Grep, Skill, Bash, Edit]
graders:
  - type: tool_used
    name: invokes-steward
    tool: Skill
    input_match: "co-founder:steward"
    min: 1
    weight: 1
  - type: tool_used
    name: runs-graph-audit
    tool: Bash
    input_match: "scripts/graph-audit"
    min: 2
    weight: 1
  - type: llm
    name: violation-blocks-clean
    criteria: >-
      The trace shows graph-audit rejecting the stale baton state, reconciles it to the
      executing initiative, reruns successfully, and only then declares the graph clean.
    focus: trace
    weight: 2
expected_outcome: The stale baton is caught by code and reconciled before steward can close.
